<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube İndirici</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl bg-gray-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-red-500">YouTube İndirici</h1>
        
        <input type="text" id="link" placeholder="YouTube linki..." 
            class="w-full p-3 rounded bg-gray-700 border border-gray-600 mb-4 text-white">
        
        <button onclick="ara()" class="w-full bg-red-600 hover:bg-red-700 p-3 rounded font-bold mb-4">
            Ara
        </button>

        <div id="loading" class="hidden text-center text-yellow-400">Yükleniyor...</div>
        <div id="sonuc" class="space-y-2"></div>
    </div>

    <script>
        // Not: Deploydan sonra bu URL'yi Render'ın verdiği adresle değiştir
        const API_URL = window.location.origin; 

        async function ara() {
            const link = document.getElementById('link').value;
            const loading = document.getElementById('loading');
            const sonuc = document.getElementById('sonuc');
            
            if(!link.includes('youtube')) return alert('Geçerli YouTube linki gir!');
            
            loading.classList.remove('hidden');
            sonuc.innerHTML = '';

            try {
                const res = await fetch(API_URL + '/api/info', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: link})
                });
                
                const data = await res.json();
                loading.classList.add('hidden');

                if(data.error) {
                    sonuc.innerHTML = `<p class="text-red-400">${data.error}</p>`;
                    return;
                }

                sonuc.innerHTML = `<h3 class="font-bold mb-2">${data.title}</h3>`;
                
                data.formats.forEach(f => {
                    sonuc.innerHTML += `
                        <div class="flex justify-between bg-gray-700 p-2 rounded">
                            <span>${f.quality}</span>
                            <a href="${f.url}" target="_blank" class="bg-green-600 px-3 py-1 rounded text-sm">İndir</a>
                        </div>
                    `;
                });
            } catch(e) {
                loading.classList.add('hidden');
                sonuc.innerHTML = '<p class="text-red-400">Hata oluştu</p>';
            }
        }
    </script>
</body>
</html>
