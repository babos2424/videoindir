<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube İndirici</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-xl bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800">
    <h1 class="text-3xl font-bold text-center mb-2 text-red-500">YouTube İndirici</h1>
    <p class="text-gray-400 text-center mb-8 text-sm">Linki yapıştır ve indirme sayfasına git</p>

    <input 
      type="text" 
      id="link" 
      placeholder="https://youtube.com/watch?v=..."
      class="w-full px-5 py-4 bg-gray-800 border border-gray-700 rounded-xl mb-4 focus:outline-none focus:border-red-500 text-lg">
    
    <button onclick="yönlendir()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold text-xl transition mb-4">
      İndirme Sayfasına Git
    </button>

    <div id="sonuc" class="text-center text-gray-400 text-sm mt-4"></div>
    
    <div class="mt-6 pt-6 border-t border-gray-800 text-center">
      <p class="text-xs text-gray-500">Alternatif indirme servisleri:</p>
      <div class="flex justify-center gap-4 mt-2">
        <button onclick="ac('y2mate')" class="text-blue-400 hover:text-blue-300 text-sm">Y2mate</button>
        <button onclick="ac('savefrom')" class="text-blue-400 hover:text-blue-300 text-sm">SaveFrom</button>
        <button onclick="ac('yt1s')" class="text-blue-400 hover:text-blue-300 text-sm">YT1s</button>
      </div>
    </div>
  </div>

  <script>
    function yönlendir() {
      const link = document.getElementById("link").value.trim();
      const sonuc = document.getElementById("sonuc");
      
      if(!link.includes('youtube') && !link.includes('youtu.be')) {
        alert("Geçerli YouTube linki girin!");
        return;
      }

      // Video ID'sini çıkar
      let videoId = '';
      if(link.includes('v=')) {
        videoId = link.split('v=')[1].split('&')[0];
      } else if(link.includes('youtu.be/')) {
        videoId = link.split('youtu.be/')[1].split('?')[0];
      }

      if(!videoId) {
        alert("Video ID bulunamadı!");
        return;
      }

      sonuc.innerHTML = `<span class="text-yellow-400">Yönlendiriliyorsunuz...</span>`;
      
      // En güncel çalışan siteye yönlendir
      setTimeout(() => {
        window.open(`https://www.y2mate.com/youtube/${videoId}`, '_blank');
      }, 500);
    }

    function ac(site) {
      const link = document.getElementById("link").value.trim();
      if(!link) { alert("Önce link yapıştır!"); return; }
      
      let videoId = '';
      if(link.includes('v=')) {
        videoId = link.split('v=')[1].split('&')[0];
      } else if(link.includes('youtu.be/')) {
        videoId = link.split('youtu.be/')[1].split('?')[0];
      }

      let url = '';
      if(site === 'y2mate') url = `https://www.y2mate.com/youtube/${videoId}`;
      else if(site === 'savefrom') url = `https://savefrom.net/?url=${encodeURIComponent(link)}`;
      else if(site === 'yt1s') url = `https://yt1s.com/en?q=${encodeURIComponent(link)}`;
      
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
