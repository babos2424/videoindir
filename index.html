<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidFetch Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-light {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .dark .gradient-text {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .input-glow:focus {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }
        
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        
        .btn-shine::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.13) 40%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.13) 60%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg) translate(-100%, -100%);
            transition: transform 0.6s;
        }
        
        .btn-shine:hover::after {
            transform: rotate(45deg) translate(100%, 100%);
        }
        
        .platform-icon {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .platform-icon.active {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px currentColor);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-[#0a0a0a] text-gray-900 dark:text-white transition-colors duration-300 overflow-x-hidden">

    <!-- Animated Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-yellow-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Theme Toggle -->
    <button onclick="toggleTheme()" class="fixed top-6 right-6 z-50 glass dark:glass-light p-3 rounded-full shadow-lg hover:scale-110 transition-transform duration-300 group">
        <i class="fas fa-moon text-gray-600 dark:text-yellow-400 text-xl group-hover:rotate-12 transition-transform"></i>
    </button>

    <!-- Main Container -->
    <div class="relative z-10 container mx-auto px-4 min-h-screen flex flex-col items-center justify-center py-12">
        
        <!-- Logo Area -->
        <div class="text-center mb-12 animate-fade-in">
            <h1 class="text-6xl md:text-7xl font-extrabold mb-4 tracking-tight">
                <span class="gradient-text">VidFetch</span>
            </h1>
            <p class="text-gray-500 dark:text-gray-400 text-lg font-medium">
                Instagram • TikTok • Facebook
            </p>
            
            <!-- Auto-detected Platform Icons -->
            <div class="flex justify-center gap-8 mt-8" id="platform-icons">
                <div class="platform-icon text-gray-300 dark:text-gray-600 text-3xl transition-all duration-300" id="icon-instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="platform-icon text-gray-300 dark:text-gray-600 text-3xl transition-all duration-300" id="icon-tiktok">
                    <i class="fab fa-tiktok"></i>
                </div>
                <div class="platform-icon text-gray-300 dark:text-gray-600 text-3xl transition-all duration-300" id="icon-facebook">
                    <i class="fab fa-facebook"></i>
                </div>
            </div>
        </div>

        <!-- Main Card -->
        <div class="w-full max-w-2xl glass dark:glass-light rounded-3xl p-8 md:p-10 shadow-2xl animate-slide-up">
            
            <!-- Input Area -->
            <div class="relative mb-6 group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl blur opacity-30 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
                <div class="relative flex items-center">
                    <i class="fas fa-link absolute left-4 text-gray-400 dark:text-gray-500 text-lg"></i>
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="Video linkini buraya yapıştır..."
                        class="w-full pl-12 pr-4 py-5 rounded-2xl bg-white/50 dark:bg-black/20 border-2 border-transparent focus:border-purple-500 outline-none text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-300 input-glow text-lg"
                        autocomplete="off"
                    >
                </div>
            </div>

            <!-- Action Button -->
            <button 
                onclick="downloadVideo()" 
                id="downloadBtn"
                class="w-full btn-shine bg-gradient-to-r from-purple-600 via-pink-600 to-red-500 hover:from-purple-700 hover:via-pink-700 hover:to-red-600 text-white font-bold py-5 px-8 rounded-2xl shadow-lg hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 text-lg flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0"
            >
                <i class="fas fa-cloud-download-alt text-xl" id="btnIcon"></i>
                <span id="btnText">Videoyu İndir</span>
            </button>

            <!-- Loading State -->
            <div id="loadingState" class="hidden mt-8 text-center">
                <div class="inline-flex items-center gap-3 px-6 py-3 rounded-full glass">
                    <div class="w-5 h-5 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-gray-600 dark:text-gray-300 font-medium">Video analiz ediliyor...</span>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mt-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 text-center animate-fade-in">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText"></span>
            </div>
        </div>

        <!-- Results Card -->
        <div id="resultCard" class="hidden w-full max-w-3xl mt-8 glass dark:glass-light rounded-3xl p-6 md:p-8 shadow-2xl animate-slide-up">
            
            <!-- Video Info -->
            <div class="flex flex-col md:flex-row gap-6 mb-6">
                <div class="relative w-full md:w-48 h-48 flex-shrink-0 rounded-2xl overflow-hidden shadow-lg group">
                    <img id="videoThumb" src="" alt="Thumbnail" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-play text-white text-3xl"></i>
                    </div>
                    <div class="absolute top-2 right-2 bg-black/70 text-white text-xs px-2 py-1 rounded-lg" id="durationBadge"></div>
                </div>
                
                <div class="flex-1 flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-2">
                        <span id="platformBadge" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-purple-500 to-pink-500 text-white"></span>
                    </div>
                    <h2 id="videoTitle" class="text-xl md:text-2xl font-bold text-gray-800 dark:text-white mb-2 line-clamp-2"></h2>
                    <p id="videoAuthor" class="text-gray-500 dark:text-gray-400 mb-4 flex items-center gap-2">
                        <i class="fas fa-user-circle"></i>
                        <span></span>
                    </p>
                </div>
            </div>

            <!-- Download Options -->
            <div class="space-y-3" id="downloadOptions">
                <!-- Options will be inserted here -->
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center text-gray-400 dark:text-gray-600 text-sm animate-fade-in">
            <p>© 2024 VidFetch Pro • Hızlı ve Güvenli Video İndirme</p>
        </div>
    </div>

    <script>
        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        // Check saved theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Platform Detection Visuals
        const urlInput = document.getElementById('urlInput');
        const icons = {
            instagram: document.getElementById('icon-instagram'),
            tiktok: document.getElementById('icon-tiktok'),
            facebook: document.getElementById('icon-facebook')
        };

        urlInput.addEventListener('input', (e) => {
            const url = e.target.value.toLowerCase();
            
            // Reset all
            Object.values(icons).forEach(icon => {
                icon.classList.remove('active', 'text-pink-600', 'text-black', 'text-blue-600', 'dark:text-pink-400', 'dark:text-white', 'dark:text-blue-400');
                icon.classList.add('text-gray-300', 'dark:text-gray-600');
            });

            // Highlight detected
            if (url.includes('instagram')) {
                icons.instagram.classList.remove('text-gray-300', 'dark:text-gray-600');
                icons.instagram.classList.add('active', 'text-pink-600', 'dark:text-pink-400');
            } else if (url.includes('tiktok')) {
                icons.tiktok.classList.remove('text-gray-300', 'dark:text-gray-600');
                icons.tiktok.classList.add('active', 'text-black', 'dark:text-white');
            } else if (url.includes('facebook') || url.includes('fb.watch')) {
                icons.facebook.classList.remove('text-gray-300', 'dark:text-gray-600');
                icons.facebook.classList.add('active', 'text-blue-600', 'dark:text-blue-400');
            }
        });

        async function downloadVideo() {
            const url = urlInput.value.trim();
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const loading = document.getElementById('loadingState');
            const error = document.getElementById('errorMessage');
            const result = document.getElementById('resultCard');

            if (!url) {
                showError('Lütfen bir video linki yapıştırın');
                return;
            }

            // UI Reset
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            result.classList.add('hidden');
            btn.disabled = true;
            btnText.textContent = 'İşleniyor...';
            btnIcon.classList.add('animate-bounce');

            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({url: url})
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Bir hata oluştu');
                }

                // Show Results
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoAuthor').querySelector('span').textContent = data.uploader;
                document.getElementById('videoThumb').src = data.thumbnail || '';
                document.getElementById('durationBadge').textContent = data.duration || '--:--';
                
                const platformBadge = document.getElementById('platformBadge');
                platformBadge.textContent = data.platform;
                
                // Platform specific colors
                if (data.platform === 'instagram') {
                    platformBadge.className = 'px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-purple-500 to-pink-500 text-white';
                } else if (data.platform === 'tiktok') {
                    platformBadge.className = 'px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-black text-white dark:bg-white dark:text-black';
                } else {
                    platformBadge.className = 'px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-blue-600 text-white';
                }

                // Generate download buttons
                const optionsDiv = document.getElementById('downloadOptions');
                optionsDiv.innerHTML = '';

                data.formats.forEach((format, index) => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between p-4 rounded-2xl bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-white/10 hover:border-purple-500/50 transition-all duration-300 group';
                    
                    const isAudio = format.type === 'audio';
                    const icon = isAudio ? 'fa-music' : 'fa-video';
                    const colorClass = isAudio ? 'from-blue-500 to-blue-600' : 'from-green-500 to-emerald-600';
                    const label = isAudio ? 'Ses (MP3)' : format.quality;
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br ${colorClass} flex items-center justify-center text-white shadow-lg">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800 dark:text-white text-lg">${label}</div>
                                ${format.size ? `<div class="text-sm text-gray-500 dark:text-gray-400">${format.size}</div>` : ''}
                            </div>
                        </div>
                        <a href="${format.url}" target="_blank" 
                           class="bg-gradient-to-r ${colorClass} hover:shadow-lg text-white px-6 py-3 rounded-xl font-bold transition-all duration-300 transform hover:scale-105 flex items-center gap-2">
                            <i class="fas fa-download"></i>
                            İndir
                        </a>
                    `;
                    
                    optionsDiv.appendChild(div);
                });

                result.classList.remove('hidden');
                result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            } catch (err) {
                showError(err.message);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
                btnText.textContent = 'Videoyu İndir';
                btnIcon.classList.remove('animate-bounce');
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        // Enter key support
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                downloadVideo();
            }
        });
    </script>
</body>
</html>
