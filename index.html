<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube İndirici</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full bg-gray-900 rounded-3xl p-10">
    <h1 class="text-3xl font-bold text-red-500 text-center mb-8">YouTube İndirici</h1>
    
    <input 
      type="text" 
      id="url" 
      placeholder="YouTube linkini yapıştır..."
      class="w-full px-5 py-4 bg-gray-800 rounded-2xl border border-gray-700 focus:border-red-500 outline-none mb-6">

    <button 
      onclick="indir()"
      class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold text-lg">
      İndir
    </button>

    <div id="sonuc" class="mt-8 text-center"></div>
  </div>

  <script>
    async function indir() {
      const url = document.getElementById("url").value.trim();
      const sonuc = document.getElementById("sonuc");

      if (!url) return alert("Link gir!");

      sonuc.innerHTML = `<p class="text-yellow-400">İşleniyor...</p>`;

      try {
        const res = await fetch("https://api.cobalt.tools/api/json", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ url: url })
        });

        const data = await res.json();

        if (data.url) {
          sonuc.innerHTML = `
            <p class="text-green-400 font-bold mb-4">İndirme hazır!</p>
            <a href="${data.url}" target="_blank" 
               class="block bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-bold">
              Videoyu İndir
            </a>`;
        } else {
          sonuc.innerHTML = `<p class="text-red-500">Bu video şu an indirilemiyor.</p>`;
        }
      } catch (err) {
        sonuc.innerHTML = `<p class="text-red-500">Hata oluştu. Tekrar dene.</p>`;
      }
    }
  </script>
</body>
</html>
