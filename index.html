<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube İndirici</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-2xl bg-gray-900 rounded-2xl shadow-2xl p-6 border border-gray-800">
    <h1 class="text-3xl font-bold text-center mb-2 text-red-500">YouTube İndirici</h1>
    <p class="text-gray-400 text-center mb-6 text-sm">Video bilgileri çekiliyor...</p>

    <div class="flex gap-2 mb-6">
      <input type="text" id="link" placeholder="YouTube linki..." 
        class="flex-1 px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-red-500">
      <button onclick="ara()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-lg font-bold">Ara</button>
    </div>

    <div id="loading" class="hidden text-center text-yellow-400 mb-4">Yükleniyor...</div>
    
    <div id="video-info" class="hidden mb-6">
      <img id="thumb" class="w-full h-48 object-cover rounded-lg mb-4" src="" alt="Thumbnail">
      <h2 id="title" class="text-xl font-bold mb-1"></h2>
      <p id="uploader" class="text-gray-400 text-sm mb-4"></p>
    </div>

    <div id="formats" class="space-y-2"></div>
  </div>

  <script>
    async function ara() {
      const link = document.getElementById('link').value;
      const loading = document.getElementById('loading');
      const info = document.getElementById('video-info');
      const formats = document.getElementById('formats');
      
      if(!link.includes('youtube') && !link.includes('youtu.be')) {
        alert('Geçerli YouTube linki gir!');
        return;
      }

      loading.classList.remove('hidden');
      info.classList.add('hidden');
      formats.innerHTML = '';

      try {
        const res = await fetch('/api/info', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url: link})
        });
        
        const data = await res.json();
        loading.classList.add('hidden');

        if(data.error) {
          formats.innerHTML = `<p class="text-red-400 text-center">${data.error}</p>`;
          return;
        }

        // Bilgileri göster
        document.getElementById('thumb').src = data.thumbnail;
        document.getElementById('title').innerText = data.title;
        document.getElementById('uploader').innerText = data.uploader;
        info.classList.remove('hidden');

        // Kaliteleri listele
        data.formats.forEach(f => {
          const btnClass = f.type === 'audio' ? 'bg-blue-600 hover:bg-blue-500' : 'bg-green-600 hover:bg-green-500';
          const label = f.type === 'audio' ? '🎵 Ses' : '📹 ' + f.quality;
          
          formats.innerHTML += `
            <div class="flex justify-between items-center bg-gray-800 p-3 rounded-lg border border-gray-700">
              <span class="font-semibold">${label}</span>
              <a href="${f.url}" target="_blank" class="${btnClass} px-4 py-2 rounded text-sm font-bold transition">
                İndir
              </a>
            </div>
          `;
        });

      } catch(e) {
        loading.classList.add('hidden');
        formats.innerHTML = '<p class="text-red-400 text-center">Bir hata oluştu</p>';
      }
    }
  </script>
</body>
</html>
